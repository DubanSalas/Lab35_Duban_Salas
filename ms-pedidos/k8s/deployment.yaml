apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-pedidos
  labels:
    app: ms-pedidos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-pedidos
  template:
    metadata:
      labels:
        app: ms-pedidos
    spec:
      containers:
        - name: ms-pedidos
          image: salasnapandubanalexander/ms-pedidos:latest
          ports:
            - containerPort: 8082
          env:
            - name: SERVER_PORT
              value: "8082"
            - name: PRODUCTOS_SERVICE_URL
              value: http://ms-productos:8081
